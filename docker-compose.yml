services:
  redis:
    image: redis:7-alpine

  backend:
    build: ./backend
    ports:
      - "8765:8765"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////db/arbitrator.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    volumes:
      - ./backend/app:/app/app
      - ./data:/data:ro
      - db_data:/db
    depends_on:
      - redis

  worker:
    build: ./backend
    command: celery -A app.queue worker --loglevel=info --queues=cells --concurrency=4
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////db/arbitrator.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    volumes:
      - ./backend/app:/app/app
      - ./data:/data:ro
      - db_data:/db
    depends_on:
      - redis
      - backend

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
